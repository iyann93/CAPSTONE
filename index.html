<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="SIAKAD Terintegrasi – Sistem Informasi Akademik dan Keuangan" />
    <title>SIAKAD Terintegrasi</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Remove Vercel Toolbar badge
      new MutationObserver(function(mutations) {
        mutations.forEach(function(m) {
          m.addedNodes.forEach(function(node) {
            if (node.nodeType === 1) {
              var el = node;
              var s = el.getAttribute && el.getAttribute('style');
              var id = el.id || '';
              var tag = el.tagName || '';
              if (
                id.includes('vercel') ||
                tag.toLowerCase() === 'vercel-live-feedback' ||
                (s && s.includes('z-index') && s.includes('2147483647')) ||
                (s && s.includes('position: fixed') && s.includes('bottom'))
              ) {
                el.remove();
              }
            }
          });
        });
      }).observe(document.body, { childList: true, subtree: false });
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
